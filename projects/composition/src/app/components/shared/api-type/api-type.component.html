@for (group of type() | detectType: typesMap(); track $index) {
  <span class="type-group">
    @if (group.hasSeparator) {
      <span class="type-sep">|</span>
    }
    @for (seg of group.segments; track $index) {
      @if (seg.route) {
        <a
          class="type-part"
          [routerLink]="seg.route"
          [fragment]="seg.fragment"
          >{{ seg.text }}</a
        >
      } @else {
        <span class="type-part">{{ seg.text }}</span>
      }
    }
  </span>
}
