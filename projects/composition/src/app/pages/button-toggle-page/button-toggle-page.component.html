<app-component-docs-viewer [componentData]="componentData">
  <app-code-example label="Single button toggles with a tooltip" [code]="examples.basic">
    <cps-button-toggle label="Single button toggles with a tooltip" infoTooltip="Provide any information here"
      [options]="options" [value]="options[1].value">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Partially disabled options with targeted tooltips" [code]="examples.partiallyDisabled">
    <cps-button-toggle label="Single button toggles with partially disabled options and targeted tooltips"
      [options]="partiallyDisabledOptions" [value]="partiallyDisabledOptions[1].value">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Disabled" [code]="examples.disabled">
    <cps-button-toggle label="Disabled button toggles" [options]="options" [disabled]="true" [value]="options[1].value">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Without mandatory selection" [code]="examples.nonMandatory">
    <cps-button-toggle label="Single button toggles without mandatory selection" [options]="options"
      [value]="options[1].value" [mandatory]="false">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Multiple selection" [code]="examples.multiple">
    <cps-button-toggle label="Multiple button toggles" [options]="options" [value]="[options[1].value]"
      [multiple]="true">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Multiple selection without mandatory" [code]="examples.multipleNonMandatory">
    <cps-button-toggle label="Multiple button toggles without mandatory selection" [options]="options"
      [value]="[options[1].value]" [multiple]="true" [mandatory]="false">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Icons with unequal widths" [code]="examples.iconsUnequalWidths">
    <cps-button-toggle label="Single button toggles with icons and unequal widths" [options]="iconOptions"
      [equalWidths]="false" [value]="iconOptions[2].value">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Icons with equal widths" [code]="examples.iconsEqualWidths">
    <cps-button-toggle label="Single button toggles with icons and equal widths" [options]="iconOptions"
      [value]="iconOptions[2].value">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Icons only with tooltips" [code]="examples.iconsOnly">
    <cps-button-toggle label="Single button toggles only with icons and tooltips" optionTooltipPosition="top"
      [options]="iconOnlyOptions">
    </cps-button-toggle>
  </app-code-example>

  <app-code-example label="Two-way binding (single)" [code]="examples.twoWayBinding">
    <div class="sync-val-example">
      <cps-button-toggle label="Single button toggles with two-way binding" [options]="options" [(ngModel)]="syncVal"
        [mandatory]="false">
      </cps-button-toggle>
      <div class="sync-val">Selected value: {{ syncVal }}</div>
    </div>
  </app-code-example>

  <app-code-example label="Two-way binding (multiple)" [code]="examples.twoWayBindingMultiple">
    <div class="sync-val-example">
      <cps-button-toggle label="Multiple button toggles with two-way binding" [options]="options"
        [(ngModel)]="multiSyncVal" [multiple]="true" [mandatory]="false">
      </cps-button-toggle>
      <div class="sync-val">Selected values: {{ multiSyncVal }}</div>
    </div>
  </app-code-example>
</app-component-docs-viewer>
