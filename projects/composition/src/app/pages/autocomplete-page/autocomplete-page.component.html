<app-component-docs-viewer [componentData]="componentData">
  <form [formGroup]="form">
    <app-code-example
      label="Required single autocomplete with a tooltip"
      [code]="examples.required.html"
      [tsCode]="examples.required.ts">
      <cps-autocomplete
        data-testid="required-autocomplete"
        label="Required single autocomplete with a tooltip"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        infoTooltip="Provide any information here"
        placeholder="Enter a city"
        [clearable]="true"
        formControlName="requiredAutocomplete">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Single search with fetched options"
      [code]="examples.singleAsync.html"
      [tsCode]="examples.singleAsync.ts">
      <cps-autocomplete
        label="Single search autocomplete with fetched options list"
        hint="This autocomplete fetches matching options list from the server side based on user input"
        [options]="singleOptionsObservable$ | async"
        optionLabel="name"
        optionInfo="info"
        placeholder="Search a city"
        [infoTooltip]="availableOptionInfo"
        [clearable]="true"
        [loading]="isSingleLoading"
        loadingMessage="Loading cities..."
        emptyMessage="No cities found"
        (inputChanged)="onSingleInputChanged($event)">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple search with fetched options"
      [code]="examples.multipleAsync.html"
      [tsCode]="examples.multipleAsync.ts">
      <cps-autocomplete
        label="Multiple search autocomplete with fetched options list"
        hint="This autocomplete fetches matching options list from the server side based on user input"
        [options]="multiOptionsObservable$ | async"
        optionLabel="name"
        optionInfo="info"
        placeholder="Search cities"
        [infoTooltip]="availableOptionInfo"
        [clearable]="true"
        [multiple]="true"
        [loading]="isMultiLoading"
        loadingMessage="Loading cities..."
        emptyMessage="No cities found"
        (inputChanged)="onMultiInputChanged($event)">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example label="Disabled" [code]="examples.disabled.html">
      <cps-autocomplete
        label="Disabled autocomplete"
        [disabled]="true"
        hint="This autocomplete is disabled">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple, not clearable"
      [code]="examples.multipleNotClearable.html"
      [tsCode]="examples.multipleNotClearable.ts">
      <cps-autocomplete
        label="Multiple autocomplete"
        [options]="options"
        optionLabel="name"
        optionValue="data"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="false"
        [multiple]="true"
        [chips]="false"
        [returnObject]="false"
        [value]="[{ code: 'CPT' }]"
        hint="This autocomplete is not clearable">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple with virtual scroll, chips and persistent clear"
      [code]="examples.virtualScroll.html"
      [tsCode]="examples.virtualScroll.ts">
      <cps-autocomplete
        label="Multiple autocomplete with virtual scroll, chips and persistent clear icon"
        [options]="options"
        hint="This autocomplete doesn't have Select All option"
        [virtualScroll]="true"
        [selectAll]="false"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [persistentClear]="true"
        [value]="[options[0], options[4]]">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple with non-closable chips"
      [code]="examples.nonClosableChips.html"
      [tsCode]="examples.nonClosableChips.ts">
      <cps-autocomplete
        label="Multiple autocomplete with non-closable chips"
        [returnObject]="false"
        [options]="options"
        optionLabel="name"
        optionValue="data"
        optionInfo="info"
        placeholder="Enter a city"
        hint="This autocomplete doesn't have a chevron icon"
        [showChevron]="false"
        [clearable]="true"
        [multiple]="true"
        [closableChips]="false"
        [value]="[options[0].data, options[4].data]">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple with prefix icon"
      [code]="examples.prefixIcon.html"
      [tsCode]="examples.prefixIcon.ts">
      <cps-autocomplete
        label="Multiple autocomplete with prefix icon"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [chips]="false"
        prefixIcon="search"
        [value]="[options[5]]">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Two-way binding with initial order preserved"
      [code]="examples.twoWayBinding.html"
      [tsCode]="examples.twoWayBinding.ts">
      <div class="sync-val-example">
        <cps-autocomplete
          width="31.25rem"
          label="Multiple autocomplete with two-way binding and keeping initial items order"
          [returnObject]="false"
          [options]="syncOptions"
          [keepInitialOrder]="true"
          optionLabel="title"
          optionValue="val"
          optionInfo="ticker"
          placeholder="Enter a company"
          hint="This autocomplete has a fixed width of 500px"
          [clearable]="true"
          [multiple]="true"
          [closableChips]="false"
          [(ngModel)]="syncVal"
          [ngModelOptions]="{ standalone: true }">
        </cps-autocomplete>
        <span class="sync-val">{{ syncVal }}</span>
      </div>
    </app-code-example>

    <app-code-example
      label="Underlined appearance"
      [code]="examples.underlined.html"
      [tsCode]="examples.underlined.ts">
      <cps-autocomplete
        label="Underlined autocomplete"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [chips]="false"
        prefixIcon="search"
        appearance="underlined">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Borderless appearance"
      [code]="examples.borderless.html"
      [tsCode]="examples.borderless.ts">
      <cps-autocomplete
        label="Borderless autocomplete"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [chips]="false"
        prefixIcon="search"
        appearance="borderless">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Async validation"
      [code]="examples.asyncValidation.html"
      [tsCode]="examples.asyncValidation.ts">
      <cps-autocomplete
        label="Autocomplete with async validation"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Select a city"
        [clearable]="true"
        [(ngModel)]="selectedOption"
        [ngModelOptions]="{ standalone: true }"
        [validating]="validating"
        (valueChanged)="onOptionSelected($event)"
        [externalError]="externalError"
        hint="This autocomplete simulates async validation upon selection.">
      </cps-autocomplete>
    </app-code-example>
  </form>
</app-component-docs-viewer>
