<app-component-docs-viewer [componentData]="componentData">
  <form [formGroup]="form">
    <app-code-example
      label="Required single autocomplete with a tooltip"
      [htmlCode]="examples.required.html"
      [tsCode]="examples.required.ts">
      <cps-autocomplete
        data-testid="required-autocomplete"
        label="Required single autocomplete with a tooltip"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        infoTooltip="Provide any information here"
        placeholder="Enter a city"
        [clearable]="true"
        formControlName="requiredAutocomplete">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Single search with fetched options"
      [htmlCode]="examples.singleAsync.html"
      [tsCode]="examples.singleAsync.ts">
      <cps-autocomplete
        data-testid="single-async-autocomplete"
        label="Single search autocomplete with fetched options list"
        hint="This autocomplete fetches matching options list from the server side based on user input"
        [options]="singleOptionsObservable$ | async"
        optionLabel="name"
        optionInfo="info"
        placeholder="Search a city"
        [infoTooltip]="availableOptionInfo"
        [clearable]="true"
        [loading]="isSingleLoading"
        loadingMessage="Loading cities..."
        emptyMessage="No cities found"
        (inputChanged)="onSingleInputChanged($event)">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple search with fetched options"
      [htmlCode]="examples.multipleAsync.html"
      [tsCode]="examples.multipleAsync.ts">
      <cps-autocomplete
        data-testid="multiple-async-autocomplete"
        label="Multiple search autocomplete with fetched options list"
        hint="This autocomplete fetches matching options list from the server side based on user input"
        [options]="multiOptionsObservable$ | async"
        optionLabel="name"
        optionInfo="info"
        placeholder="Search cities"
        [infoTooltip]="availableOptionInfo"
        [clearable]="true"
        [multiple]="true"
        [loading]="isMultiLoading"
        loadingMessage="Loading cities..."
        emptyMessage="No cities found"
        (inputChanged)="onMultiInputChanged($event)">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example label="Disabled" [htmlCode]="examples.disabled.html">
      <cps-autocomplete
        data-testid="disabled-autocomplete"
        label="Disabled autocomplete"
        [disabled]="true"
        hint="This autocomplete is disabled">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple, not clearable"
      [htmlCode]="examples.multipleNotClearable.html"
      [tsCode]="examples.multipleNotClearable.ts">
      <cps-autocomplete
        data-testid="multiple-not-clearable-autocomplete"
        label="Multiple autocomplete"
        [options]="options"
        optionLabel="name"
        optionValue="data"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="false"
        [multiple]="true"
        [chips]="false"
        [returnObject]="false"
        [value]="[{ code: 'CPT' }]"
        hint="This autocomplete is not clearable">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple with virtual scroll, chips and persistent clear"
      [htmlCode]="examples.virtualScroll.html"
      [tsCode]="examples.virtualScroll.ts">
      <cps-autocomplete
        data-testid="virtual-scroll-autocomplete"
        label="Multiple autocomplete with virtual scroll, chips and persistent clear icon"
        [options]="options"
        hint="This autocomplete doesn't have Select All option"
        [virtualScroll]="true"
        [selectAll]="false"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [persistentClear]="true"
        [value]="[options[0], options[4]]">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple with non-closable chips"
      [htmlCode]="examples.nonClosableChips.html"
      [tsCode]="examples.nonClosableChips.ts">
      <cps-autocomplete
        data-testid="non-closable-chips-autocomplete"
        label="Multiple autocomplete with non-closable chips"
        [returnObject]="false"
        [options]="options"
        optionLabel="name"
        optionValue="data"
        optionInfo="info"
        placeholder="Enter a city"
        hint="This autocomplete doesn't have a chevron icon"
        [showChevron]="false"
        [clearable]="true"
        [multiple]="true"
        [closableChips]="false"
        [value]="[options[0].data, options[4].data]">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple with prefix icon"
      [htmlCode]="examples.prefixIcon.html"
      [tsCode]="examples.prefixIcon.ts">
      <cps-autocomplete
        data-testid="prefix-icon-autocomplete"
        label="Multiple autocomplete with prefix icon"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [chips]="false"
        prefixIcon="search"
        [value]="[options[5]]">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Two-way binding with initial order preserved"
      [htmlCode]="examples.twoWayBinding.html"
      [tsCode]="examples.twoWayBinding.ts">
      <div class="sync-val-example">
        <cps-autocomplete
          data-testid="two-way-binding-autocomplete"
          width="31.25rem"
          label="Multiple autocomplete with two-way binding and keeping initial items order"
          [returnObject]="false"
          [options]="syncOptions"
          [keepInitialOrder]="true"
          optionLabel="title"
          optionValue="val"
          optionInfo="ticker"
          placeholder="Enter a company"
          hint="This autocomplete has a fixed width of 31.25rem"
          [clearable]="true"
          [multiple]="true"
          [closableChips]="false"
          [(ngModel)]="syncVal"
          [ngModelOptions]="{ standalone: true }">
        </cps-autocomplete>
        <span class="sync-val">{{ syncVal }}</span>
      </div>
    </app-code-example>

    <app-code-example
      label="Underlined appearance"
      [htmlCode]="examples.underlined.html"
      [tsCode]="examples.underlined.ts">
      <cps-autocomplete
        label="Underlined autocomplete"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [chips]="false"
        prefixIcon="search"
        appearance="underlined">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Borderless appearance"
      [htmlCode]="examples.borderless.html"
      [tsCode]="examples.borderless.ts">
      <cps-autocomplete
        label="Borderless autocomplete"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [clearable]="true"
        [multiple]="true"
        [chips]="false"
        prefixIcon="search"
        appearance="borderless">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Async validation"
      [htmlCode]="examples.asyncValidation.html"
      [tsCode]="examples.asyncValidation.ts">
      <cps-autocomplete
        data-testid="async-validation-autocomplete"
        label="Autocomplete with async validation"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Select a city"
        [clearable]="true"
        [(ngModel)]="selectedOption"
        [ngModelOptions]="{ standalone: true }"
        [validating]="validating"
        (valueChanged)="onOptionSelected($event)"
        [externalError]="externalError"
        hint="This autocomplete simulates async validation upon selection.">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Filtering by alias"
      [htmlCode]="examples.aliasFiltering.html"
      [tsCode]="examples.aliasFiltering.ts">
      <cps-autocomplete
        data-testid="alias-filtering-autocomplete"
        label="Autocomplete filtering by alias"
        hint="Try typing a country code such as PRG or CPT - it matches the alias field, not the label"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        [withOptionsAliases]="true"
        [useOptionsAliasesWhenNoMatch]="true"
        placeholder="Enter a city or its alias">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Custom empty option index"
      [htmlCode]="examples.emptyOptionIndex.html"
      [tsCode]="examples.emptyOptionIndex.ts">
      <cps-autocomplete
        data-testid="empty-option-index-autocomplete"
        label="Autocomplete with a custom empty option index"
        hint="Clearing this autocomplete falls back to Capetown instead of an empty value"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        [emptyOptionIndex]="2"
        [clearable]="true"
        [value]="emptyOptionIndexValue">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Clear without reopening"
      [htmlCode]="examples.openOnClear.html"
      [tsCode]="examples.openOnClear.ts">
      <cps-autocomplete
        data-testid="open-on-clear-false-autocomplete"
        label="Autocomplete that stays closed after clearing"
        hint="Clearing this autocomplete does not reopen the dropdown"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        [clearable]="true"
        [openOnClear]="false"
        [value]="openOnClearValue">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Hidden hint and error details"
      [htmlCode]="examples.hideDetails.html"
      [tsCode]="examples.hideDetails.ts">
      <cps-autocomplete
        data-testid="hide-details-autocomplete"
        label="Required autocomplete without hint or error text"
        hint="This hint is never shown because hideDetails is true"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        [clearable]="true"
        [hideDetails]="true"
        formControlName="hideDetailsAutocomplete">
      </cps-autocomplete>
    </app-code-example>

    <app-code-example
      label="Multiple without select all"
      [htmlCode]="examples.selectAllFalse.html">
      <cps-autocomplete
        data-testid="select-all-false-autocomplete"
        label="Multiple autocomplete without a Select all option"
        [options]="options"
        optionLabel="name"
        optionInfo="info"
        placeholder="Enter a city"
        [multiple]="true"
        [selectAll]="false">
      </cps-autocomplete>
    </app-code-example>
  </form>
</app-component-docs-viewer>
