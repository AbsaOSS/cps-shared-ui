<app-component-docs-viewer [componentData]="componentData">
  <!-- Example of component's usage -->
  <div class="search-input">
    <cps-input
      ariaLabel="Search an icon"
      placeholder="Search an icon"
      (valueChanged)="onSearchChanged($event)"
      hint="Click on any icon to copy its name"
      prefixIcon="search"
      [clearable]="true"></cps-input>
  </div>

  <div class="icon-grid">
    @for (name of filteredIconsList; track name) {
      <button
        type="button"
        class="icon-row"
        [attr.aria-label]="'Copy ' + name + ' icon name'"
        (click)="onCopyIconName(name)">
        <cps-icon
          [icon]="name"
          size="normal"
          color="var(--cps-text-primary)"></cps-icon>
        <span>{{ name }}</span>
      </button>
    }
  </div>
</app-component-docs-viewer>
