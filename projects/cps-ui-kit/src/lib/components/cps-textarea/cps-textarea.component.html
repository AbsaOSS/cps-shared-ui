<div class="cps-textarea-container" [style.width]="cvtWidth">
  @if (label) {
    <div
      class="cps-textarea-label"
      [class.cps-textarea-label-disabled]="disabled && !readonly">
      <label>{{ label }}</label>
      @if (infoTooltip) {
        <cps-info-circle
          class="cps-textarea-label-info-circle"
          size="xsmall"
          [tooltipPosition]="infoTooltipPosition"
          [tooltipContentClass]="infoTooltipClass"
          [tooltipMaxWidth]="infoTooltipMaxWidth"
          [tooltipPersistent]="infoTooltipPersistent"
          [tooltipText]="infoTooltip">
        </cps-info-circle>
      }
    </div>
  }

  <div
    class="cps-textarea-wrap"
    [class.cps-textarea-wrap-error]="!!error"
    [class.clearable]="clearable"
    [class.persistent-clear]="persistentClear"
    [class.keyboard-focused]="isKeyboardFocused">
    <textarea
      #textareaEl
      [attr.spellcheck]="spellcheck"
      [attr.autocomplete]="autocomplete"
      [attr.aria-label]="ariaLabel || label || null"
      [attr.aria-invalid]="error ? 'true' : null"
      [attr.aria-required]="isRequired || null"
      [attr.aria-describedby]="describedBy"
      [cols]="cols"
      [rows]="rows"
      [autofocus]="autofocus"
      [disabled]="disabled"
      [readonly]="readonly"
      [placeholder]="placeholder"
      [value]="value"
      [style.width]="cvtWidth"
      [style.max-height.px]="maxHeightPx"
      [style.resize]="readonly || disabled ? 'none' : resizable"
      (mousedown)="onTextareaMousedown()"
      (blur)="onBlur()"
      (focus)="onFocus()"
      (input)="updateValueEvent($event)">
    </textarea>

    @if (clearable && !disabled && !readonly) {
      <span
        class="clear-btn"
        role="button"
        [attr.tabindex]="isClearButtonVisible ? 0 : null"
        aria-label="Clear"
        [attr.aria-hidden]="isClearButtonVisible ? null : 'true'"
        [style.visibility]="isClearButtonVisible ? 'visible' : 'hidden'"
        (mousedown)="$event.preventDefault()"
        (click)="onClear($event)"
        (keydown.enter)="onClear($event)"
        (keydown.space)="onClear($event)">
        <cps-icon icon="delete" size="small"></cps-icon>
      </span>
    }

    @if (resizable === 'vertical' && !disabled && !readonly) {
      <div
        class="cps-textarea-resize-handle"
        role="button"
        tabindex="0"
        aria-label="Vertically resize textarea"
        aria-description="Use up and down arrow keys to resize"
        (keydown)="onResizeHandleKeydown($event)"></div>
    }
  </div>
  @if (!error && !hideDetails) {
    <div [id]="hintId" class="cps-textarea-hint">
      {{ hint }}
    </div>
  }
  @if (error && !hideDetails) {
    <div
      [id]="errorId"
      class="cps-textarea-error"
      aria-live="polite"
      aria-atomic="true">
      {{ error }}
    </div>
  }
</div>
