<div class="cps-textarea-container" [style.width]="cvtWidth">
  @if (label) {
    <div
      class="cps-textarea-label"
      [ngClass]="{ 'cps-textarea-label-disabled': disabled }">
      <label>{{ label }}</label>
      @if (infoTooltip) {
        <cps-info-circle
          class="cps-textarea-label-info-circle"
          size="xsmall"
          [tooltipPosition]="infoTooltipPosition"
          [tooltipContentClass]="infoTooltipClass"
          [tooltipMaxWidth]="infoTooltipMaxWidth"
          [tooltipPersistent]="infoTooltipPersistent"
          [tooltipText]="infoTooltip">
        </cps-info-circle>
      }
    </div>
  }

  <div
    class="cps-textarea-wrap"
    [ngClass]="{
      'cps-textarea-wrap-error': error,
      clearable: clearable,
      'persistent-clear': persistentClear
    }">
    <textarea
      [attr.spellcheck]="spellcheck"
      [attr.aria-label]="ariaLabel || label || null"
      [attr.aria-invalid]="error ? 'true' : null"
      [attr.aria-required]="isRequired || null"
      [attr.aria-describedby]="describedBy"
      [cols]="cols"
      [rows]="rows"
      [autofocus]="autofocus"
      [disabled]="disabled"
      [placeholder]="placeholder"
      [value]="value"
      [ngStyle]="{
        width: cvtWidth,
        resize: resizable
      }"
      (blur)="onBlur()"
      (focus)="onFocus()"
      (input)="updateValueEvent($event)">
    </textarea>

    @if (clearable && !disabled) {
      <span
        [style.visibility]="
          persistentClear || (!persistentClear && value) ? 'visible' : 'hidden'
        "
        class="clear-btn">
        <cps-icon icon="delete" size="small" (click)="clear()"></cps-icon>
      </span>
    }
  </div>
  @if (!error && !hideDetails) {
    <div [id]="hintId" class="cps-textarea-hint">
      {{ hint }}
    </div>
  }
  @if (error && !hideDetails) {
    <div
      [id]="errorId"
      class="cps-textarea-error"
      aria-live="polite"
      aria-atomic="true">
      {{ error }}
    </div>
  }
</div>
