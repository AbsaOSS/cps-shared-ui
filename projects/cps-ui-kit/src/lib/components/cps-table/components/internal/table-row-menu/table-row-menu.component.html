<cps-menu
  #rowMenu
  [items]="items"
  [compressed]="true"
  [withArrow]="false"
  (menuShown)="onMenuShown()"
  (menuHidden)="onMenuHidden()">
</cps-menu>
<button
  type="button"
  class="cps-table-row-menu-btn"
  aria-label="Row actions"
  aria-haspopup="menu"
  [attr.aria-expanded]="isMenuOpen"
  (click)="rowMenu.toggle($event)">
  <cps-icon icon="dropdown-menu" size="1.375rem"></cps-icon>
</button>
