<cps-menu
  #rowMenu
  [items]="items"
  [compressed]="true"
  [withArrow]="false"
  (menuShown)="isMenuOpen = true"
  (menuHidden)="isMenuOpen = false">
</cps-menu>
<button
  type="button"
  class="cps-table-row-menu-icon"
  aria-label="Row actions"
  aria-haspopup="menu"
  [attr.aria-expanded]="isMenuOpen"
  (click)="rowMenu.toggle($event)">
  <cps-icon icon="dropdown-menu" size="1.375rem" aria-hidden="true"></cps-icon>
</button>
