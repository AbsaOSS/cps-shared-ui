<div class="cps-btn-toggle">
  @if (label) {
    <div class="cps-btn-toggle-label" [class.disabled]="disabled">
      <span>{{ label }}</span>
      @if (infoTooltip) {
        <cps-info-circle
          class="cps-btn-toggle-label-info-circle"
          size="xsmall"
          [tooltipPosition]="infoTooltipPosition"
          [tooltipContentClass]="infoTooltipClass"
          [tooltipMaxWidth]="infoTooltipMaxWidth"
          [tooltipPersistent]="infoTooltipPersistent"
          [tooltipText]="infoTooltip">
        </cps-info-circle>
      }
    </div>
  }
  <div
    class="cps-btn-toggle-content"
    [attr.role]="
      radioNavigation && !multiple && mandatory ? 'radiogroup' : 'group'
    "
    [attr.aria-label]="ariaLabel || label || null"
    [attr.aria-disabled]="disabled || null">
    @for (option of options; track option.value) {
      @if (option.tooltip) {
        <span
          class="cps-btn-toggle-option-wrapper"
          [cpsTooltip]="option.tooltip"
          tooltipCloseDelay="0"
          [tooltipPosition]="optionTooltipPosition">
          <ng-container
            *ngTemplateOutlet="
              radioNavigation && !multiple && mandatory
                ? radioTemplate
                : buttonTemplate;
              context: { option }
            "></ng-container>
        </span>
      }
      @if (!option.tooltip) {
        <span class="cps-btn-toggle-option-wrapper">
          <ng-container
            *ngTemplateOutlet="
              radioNavigation && !multiple && mandatory
                ? radioTemplate
                : buttonTemplate;
              context: { option }
            "></ng-container>
        </span>
      }
    }
  </div>
</div>
<ng-template #radioTemplate let-option="option">
  <label
    class="cps-btn-toggle-content-option"
    [class.is-selected]="
      option.value | checkOptionSelected: value : multiple : true : ''
    "
    [class.is-disabled]="option.disabled || disabled"
    [style.min-width.rem]="equalWidths ? largestButtonWidthRem : null">
    <input
      type="radio"
      class="cps-btn-toggle-radio-input"
      [name]="groupName"
      [checked]="
        option.value | checkOptionSelected: value : multiple : true : ''
      "
      [disabled]="option.disabled || disabled"
      (change)="onRadioChange(option.value)"
      [attr.aria-label]="option.ariaLabel || option.label || null" />
    <span class="cps-btn-toggle-content-option-inner">
      @if (option.icon) {
        <cps-icon
          [class.me-2]="!!option.label"
          [icon]="option.icon"
          aria-hidden="true">
        </cps-icon>
      }
      @if (option.label) {
        <span>{{ option.label }}</span>
      }
    </span>
  </label>
</ng-template>
<ng-template #buttonTemplate let-option="option">
  <button
    type="button"
    class="cps-btn-toggle-content-option"
    [class.is-selected]="
      option.value | checkOptionSelected: value : multiple : true : ''
    "
    [disabled]="option.disabled || disabled"
    (click)="updateValueOnClick(option.value)"
    [attr.aria-pressed]="
      option.value | checkOptionSelected: value : multiple : true : ''
    "
    [attr.aria-label]="option.ariaLabel || option.label || null"
    [style.min-width.rem]="equalWidths ? largestButtonWidthRem : null">
    <span class="cps-btn-toggle-content-option-inner">
      @if (option.icon) {
        <cps-icon
          [class.me-2]="!!option.label"
          [icon]="option.icon"
          aria-hidden="true">
        </cps-icon>
      }
      @if (option.label) {
        <span>{{ option.label }}</span>
      }
    </span>
  </button>
</ng-template>
