<div [ngClass]="classesList" [attr.aria-label]="label">
  @if (icon) {
    <cps-icon
      class="cps-chip-icon"
      [icon]="icon"
      [color]="iconColor"></cps-icon>
  }
  <span class="cps-chip-label">{{ label }}</span>
  @if (closable) {
    <cps-icon
      role="button"
      [tabindex]="disabled ? -1 : 0"
      [attr.aria-label]="closeButtonAriaLabel"
      [attr.aria-disabled]="disabled"
      class="cps-chip-close-icon"
      icon="close-x"
      size="xsmall"
      color="text-darkest"
      (click)="onCloseClick($event)"
      (keydown.enter)="onCloseClick($event)"
      (keydown.space)="onCloseClick($event)">
    </cps-icon>
  }
</div>
