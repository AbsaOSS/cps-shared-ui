<div class="cps-checkbox-container">
  <label class="cps-checkbox" [class.cps-checkbox-disabled]="disabled">
    <input
      type="checkbox"
      class="cps-checkbox-input"
      [disabled]="disabled"
      [checked]="value"
      (change)="updateValueEvent($event)"
      [attr.aria-label]="ariaLabel || label || null" />
    <span class="cps-checkbox-indicator" aria-hidden="true"></span>
    @if (icon) {
      <cps-icon
        class="cps-checkbox-icon"
        [icon]="icon"
        size="small"
        [color]="disabled ? 'text-mild' : iconColor"
        aria-hidden="true">
      </cps-icon>
    }
    @if (label) {
      <span class="cps-checkbox-label">
        {{ label }}
      </span>
    }
  </label>
  @if (infoTooltip) {
    <cps-info-circle
      class="cps-checkbox-info-circle"
      size="xsmall"
      [tooltipPosition]="infoTooltipPosition"
      [tooltipContentClass]="infoTooltipClass"
      [tooltipMaxWidth]="infoTooltipMaxWidth"
      [tooltipPersistent]="infoTooltipPersistent"
      [tooltipText]="infoTooltip">
    </cps-info-circle>
  }
</div>
