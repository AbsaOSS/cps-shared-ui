<div
  class="cps-radio-group"
  role="radiogroup"
  [attr.aria-label]="computedLabel"
  [attr.aria-disabled]="disabled || null"
  [attr.aria-required]="isRequired || null"
  [attr.aria-invalid]="error ? 'true' : null">
  @if (groupLabel) {
    <div class="cps-radio-group-label">
      <span>{{ groupLabel }}</span>
      @if (infoTooltip) {
        <cps-info-circle
          class="cps-radio-group-label-info-circle"
          size="xsmall"
          [tooltipPosition]="infoTooltipPosition"
          [tooltipContentClass]="infoTooltipClass"
          [tooltipMaxWidth]="infoTooltipMaxWidth"
          [tooltipPersistent]="infoTooltipPersistent"
          [tooltipText]="infoTooltip">
        </cps-info-circle>
      }
    </div>
  }

  <div
    #contentRef
    class="cps-radio-group-content"
    [class.cps-radio-group-content-vertical]="vertical"
    [class.cps-radio-group-content-horizontal]="!vertical">
    <ng-content></ng-content>
  </div>

  @if (!contentRef.innerHTML.trim()) {
    <div
      class="cps-radio-group-content"
      [class.cps-radio-group-content-vertical]="vertical"
      [class.cps-radio-group-content-horizontal]="!vertical">
      @for (option of options; track option) {
        <cps-radio-button
          [option]="option"
          [groupName]="groupName"
          [checked]="option.value === value"
          [groupDisabled]="disabled"
          (blurred)="onBlur()"
          (focused)="onFocus()"
          (updateValueEvent)="updateValueEvent($event)">
        </cps-radio-button>
      }
    </div>
  }
  @if (!error && !hideDetails) {
    <div class="cps-radio-hint">
      {{ hint }}
    </div>
  }
  @if (error && !hideDetails) {
    <div class="cps-radio-error" role="alert" aria-live="assertive">
      {{ error }}
    </div>
  }
</div>
