@if (option.tooltip) {
  <div
    class="cps-radio-group-content-button"
    [cpsTooltip]="option.tooltip || ''"
    tooltipCloseDelay="0"
    tooltipPosition="bottom">
    <ng-container
      *ngTemplateOutlet="
        optionRadioTemplate;
        context: {
          option: option
        }
      "></ng-container>
  </div>
} @else {
  <div class="cps-radio-group-content-button">
    <ng-container
      *ngTemplateOutlet="
        optionRadioTemplate;
        context: {
          option: option
        }
      "></ng-container>
  </div>
}

<ng-template #optionRadioTemplate let-option="option">
  <span class="cps-radio-input-wrapper">
    <input
      type="radio"
      [id]="inputId"
      [name]="groupName"
      [attr.aria-label]="option.ariaLabel || null"
      [disabled]="option.disabled || groupDisabled"
      [value]="option.value"
      [checked]="checked"
      (change)="updateValue($event)"
      (focus)="onFocus()"
      (blur)="onBlur()" />
  </span>
  <div
    #contentRef
    class="content"
    [attr.inert]="!checked || option.disabled || groupDisabled ? '' : null">
    <ng-content></ng-content>
  </div>
  @if (!contentRef.innerHTML.trim() && option.label) {
    <label
      class="cps-radio-group-content-button-label"
      [for]="inputId"
      [style.cursor]="option.disabled || groupDisabled ? 'default' : 'pointer'"
      >{{ option.label }}
    </label>
  }
</ng-template>
