<div>
  <button
    type="button"
    [ngClass]="classesList"
    [disabled]="disabled"
    (click)="onClick($event)"
    [attr.aria-busy]="loading ? true : null"
    [attr.aria-disabled]="disabled ? true : null"
    [attr.aria-label]="ariaLabel || label || null"
    [class.loading]="loading"
    [class.cps-button--key-active]="enterActive"
    (keydown.enter)="onEnterKeydown()"
    (keyup.enter)="onEnterKeyup()"
    (blur)="onBlur()"
    [ngStyle]="{
      backgroundColor: type === 'solid' ? buttonColor : 'transparent',
      color: textColor,
      height: cvtHeight || 'none',
      borderRadius: borderRadius
    }">
    <div class="cps-button__spinner" aria-hidden="true">
      @if (loading) {
        <cps-progress-circular
          color="currentColor"
          [diameter]="cvtIconSize"
          strokeWidth="2">
        </cps-progress-circular>
      }
    </div>
    <div
      class="cps-button__content"
      [style.visibility]="loading ? 'hidden' : null"
      [attr.aria-hidden]="loading ? true : null">
      @if (icon) {
        <cps-icon
          class="cps-button__icon"
          [icon]="icon"
          [color]="disabled ? 'text-light' : textColor"
          aria-hidden="true"
          [size]="cvtIconSize">
        </cps-icon>
      }
      @if (label) {
        <span
          class="cps-button__text"
          [ngStyle]="{ 'font-size': cvtFontSize || null }">
          {{ label }}
        </span>
      }
    </div>
  </button>
</div>
