<span
  [attr.role]="isPolite ? 'status' : 'alert'"
  aria-atomic="true"
  class="cps-sr-only">
  {{ srAnnouncement }}
</span>
<div
  (mouseenter)="clearTimeout()"
  (mouseleave)="initiateTimeout()"
  (focusin)="clearTimeout()"
  (focusout)="initiateTimeout()"
  [class]="data.type"
  [@toastState]="{
    value: 'visible',
    params: {
      showTiming: resolvedShowTiming,
      hideTiming: resolvedHideTiming
    }
  }"
  [style.max-width]="maxWidth"
  class="cps-toast-content">
  <div class="cps-toast-icon" [class.filled]="filled" aria-hidden="true">
    <cps-icon
      [icon]="icon"
      [color]="filled ? '#fff' : color"
      size="normal"></cps-icon>
  </div>
  <div class="cps-toast-message">
    <p class="cps-toast-message-header">{{ data.message || '' }}</p>
    @if (data.details) {
      <p class="cps-toast-message-details">
        {{ data.details }}
      </p>
    }
  </div>
  <div class="cps-toast-buttons">
    <cps-button
      (clicked)="close()"
      [color]="color"
      [ariaLabel]="closeAriaLabel"
      icon="close-x"
      class="cps-toast-close-button"
      width="2.5rem"
      type="borderless"></cps-button>
  </div>
</div>
