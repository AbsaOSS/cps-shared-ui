name: Release Please

on:
  push:
    branches:
      - master

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['projects/cps-ui-kit--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      # Required for npm trusted publishing (OIDC). No NPM_AUTH_TOKEN needed.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js v24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build CPS UI Kit
        run: npm run build

      - name: Publish to NPM registry
        working-directory: dist/cps-ui-kit
        # Trusted publishing: token is intentionally empty, auth comes from OIDC.
        run: NODE_AUTH_TOKEN="" npm publish
